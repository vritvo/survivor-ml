name: Refresh season data

on:
  # Manual "Run workflow" button in GitHub → Actions tab (use this to test).
  workflow_dispatch:

  # Times are UTC (GitHub requirement).
  # 15:00 UTC ≈ 10:00 AM US Eastern (standard) / 11:00 AM Eastern (daylight).
  
  schedule:
    - cron: '0 15 * * 6'  # Saturday
    - cron: '0 15 * * 2'  # Tuesday

permissions:
  contents: write 

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Fetch data and regenerate season JSON
        run: uv run python main.py --fetch-data

      - name: Commit and push if season data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add app/public/data/seasons/

          if git diff --staged --quiet; then
            echo "No changes to season JSON — skipping commit."
          else
            git commit -m "chore: refresh season data"
            git push
          fi
